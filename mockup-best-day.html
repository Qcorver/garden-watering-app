<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mockup – Beste Dag</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #e5e7e5;
    display: flex;
    justify-content: center;
    padding: 40px 16px 60px;
  }
  .phone {
    width: 375px;
    background: #f0f4ec;
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.28);
    border: 8px solid #1a1a1a;
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(160deg, #1a3d1a 0%, #2d5a2d 40%, #3d7a3d 100%);
    padding: 52px 28px 44px;
    position: relative;
    overflow: hidden;
    min-height: 280px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(120,200,80,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(80,160,60,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-top-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 8px;
  }
  .lang-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.5);
    color: #fff;
  }

  /* Date block */
  .date-display {
    position: relative;
    z-index: 1;
    margin-bottom: 12px;
  }
  .date-day {
    font-family: 'Playfair Display', serif;
    font-size: 88px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -4px;
  }
  .date-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .date-meta span {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .date-dot {
    width: 4px; height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }

  .date-location { margin-top: 4px; }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    padding: 8px 16px;
    position: relative;
    z-index: 1;
  }
  .badge span {
    color: #fff;
    font-size: 13px;
    font-weight: 500;
  }
  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #34d399;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.6; transform:scale(1.3); }
  }

  /* Plant illustration (right) */
  .plant {
    position: absolute;
    bottom: 12px; right: 20px;
    z-index: 1;
    font-size: 96px;
    line-height: 1;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
  }

  /* ── Content ── */
  .content {
    padding: 24px 20px 20px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6b7c69;
    margin-bottom: 8px;
  }
  .rain-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(30,60,20,0.06);
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .divider { width: 1px; background: #e8f0e4; flex-shrink: 0; }
  .rain-stat { flex: 1; }
  .rain-label { font-size: 11px; color: #9aab94; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .rain-value { font-size: 22px; font-weight: 700; color: #1a3d1a; }
  .rain-unit  { font-size: 12px; color: #9aab94; font-weight: 400; }
  .rain-bar-wrap { height: 4px; background: #e8f0e4; border-radius: 2px; margin-top: 8px; }
  .rain-bar { height: 4px; border-radius: 2px; background: linear-gradient(90deg, #5aaa3a, #3d7a3d); }

  .rec-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(30,60,20,0.06);
    margin-bottom: 16px;
  }
  .rec-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #9aab94; margin-bottom: 8px; }
  .rec-main  { font-size: 28px; font-weight: 700; color: #1a3d1a; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .rec-sub   { font-size: 13px; color: #6b7c69; }

  /* Tab bar */
  .tabbar {
    background: rgba(240,244,236,0.97);
    border-top: 1px solid rgba(120,160,100,0.15);
    display: flex;
    padding: 8px 0 20px;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; font-size: 10px; color: #9aab94; cursor: pointer;
  }
  .tab.active { color: #3d7a3d; font-weight: 600; }
  .tab .icon  { font-size: 22px; }
</style>
</head>
<body>
<div class="phone">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-top-row">
      <div class="lang-toggle">
        <span class="lang-btn">EN</span>
        <span class="lang-btn active">NL</span>
      </div>
    </div>

    <div class="date-display">
      <div class="date-day">23</div>
      <div class="date-meta">
        <span>April</span>
        <div class="date-dot"></div>
        <span>Donderdag</span>
      </div>
      <!-- NEW: zelfde stijl als date-meta -->
      <div class="date-meta date-location">
        <span>Amsterdam, NL</span>
      </div>
    </div>

    <div class="badge">
      <div class="badge-dot"></div>
      <span>Vandaag gesproeid</span>
    </div>

    <!-- Plant illustration -->
    <div class="plant">🌸</div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="section-label">Neerslag overzicht</div>
    <div class="rain-card">
      <div class="rain-stat">
        <div class="rain-label">Afgelopen 7 dagen</div>
        <div><span class="rain-value">3.2</span><span class="rain-unit"> mm</span></div>
        <div class="rain-bar-wrap"><div class="rain-bar" style="width:16%"></div></div>
      </div>
      <div class="divider"></div>
      <div class="rain-stat">
        <div class="rain-label">Komende 3 dagen</div>
        <div><span class="rain-value">0.0</span><span class="rain-unit"> mm</span></div>
        <div class="rain-bar-wrap"><div class="rain-bar" style="width:2%"></div></div>
      </div>
    </div>

    <div class="rec-card">
      <div class="rec-label">Aanbeveling</div>
      <div class="rec-main">~8 min per m²</div>
      <div class="rec-sub">Besproeien vandaag aanbevolen</div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab active">
      <span class="icon">💧</span><span>Beste Dag</span>
    </div>
    <div class="tab"><span class="icon">📅</span><span>Kalender</span></div>
    <div class="tab"><span class="icon">✂️</span><span>Snoeien</span></div>
    <div class="tab"><span class="icon">⚙️</span><span>Instellingen</span></div>
  </div>

</div>
</body>
</html>
