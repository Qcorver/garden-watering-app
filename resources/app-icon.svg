<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6eaf8"/>
      <stop offset="100%" stop-color="#eaf4ea"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dc65a"/>
      <stop offset="100%" stop-color="#4a8c2a"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1024" height="1024" fill="url(#skyGrad)" rx="180"/>

  <!-- Ground strip -->
  <ellipse cx="512" cy="870" rx="460" ry="80" fill="url(#groundGrad)"/>
  <rect x="52" y="870" width="920" height="154" fill="#4a8c2a"/>


  <!-- ══════════════════════════════════
       LEFT: Cloud with rain
       ══════════════════════════════════ -->
  <g transform="translate(130, 320)">
    <!-- Cloud body -->
    <circle cx="0"   cy="60"  r="68"  fill="#b0ccdf"/>
    <circle cx="80"  cy="30"  r="88"  fill="#c8dcea"/>
    <circle cx="170" cy="60"  r="65"  fill="#b0ccdf"/>
    <rect x="-68" y="60" width="305" height="80" fill="#c8dcea"/>
    <rect x="-68" y="115" width="305" height="30" rx="15" fill="#b0ccdf"/>

    <!-- Rain drops (straight lines, v1 style) -->
    <line x1="10"  y1="168" x2="0"   y2="218" stroke="#5b9bd5" stroke-width="11" stroke-linecap="round"/>
    <line x1="55"  y1="175" x2="45"  y2="230" stroke="#5b9bd5" stroke-width="11" stroke-linecap="round"/>
    <line x1="100" y1="165" x2="90"  y2="218" stroke="#5b9bd5" stroke-width="11" stroke-linecap="round"/>
    <line x1="145" y1="172" x2="135" y2="225" stroke="#5b9bd5" stroke-width="11" stroke-linecap="round"/>
    <line x1="190" y1="168" x2="180" y2="218" stroke="#5b9bd5" stroke-width="11" stroke-linecap="round"/>
    <line x1="32"  y1="228" x2="25"  y2="270" stroke="#5b9bd5" stroke-width="9"  stroke-linecap="round" opacity="0.6"/>
    <line x1="122" y1="228" x2="115" y2="270" stroke="#5b9bd5" stroke-width="9"  stroke-linecap="round" opacity="0.6"/>
    <line x1="168" y1="232" x2="161" y2="272" stroke="#5b9bd5" stroke-width="9"  stroke-linecap="round" opacity="0.6"/>
  </g>


  <!-- ══════════════════════════════════
       MIDDLE: Sun
       ══════════════════════════════════ -->
  <g transform="translate(512, 220)">
    <line x1="0"    y1="-115" x2="0"    y2="-145" stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="0"    y1="115"  x2="0"    y2="145"  stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="-115" y1="0"   x2="-145" y2="0"     stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="115"  y1="0"   x2="145"  y2="0"     stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="-81"  y1="-81" x2="-103" y2="-103"  stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="81"   y1="-81" x2="103"  y2="-103"  stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="-81"  y1="81"  x2="-103" y2="103"   stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <line x1="81"   y1="81"  x2="103"  y2="103"   stroke="#f4a820" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="95" fill="#f9c74f"/>
    <circle cx="0" cy="0" r="78" fill="#fad86b"/>
  </g>




  <!-- ══════════════════════════════════
       CENTER FOREGROUND: Healthy upright flower + wet soil
       ══════════════════════════════════ -->
  <g transform="translate(512, 960) scale(3.5)">
    <!-- Pot -->
    <path d="M-35 0 L-28 -25 L28 -25 L35 0 Z" fill="#c2855a"/>
    <rect x="-37" y="-4"  width="74" height="8"  rx="4" fill="#a86a40"/>
    <rect x="-32" y="-27" width="64" height="9"  rx="4" fill="#d4956a"/>
    <!-- Moist soil -->
    <ellipse cx="0" cy="-25" rx="32" ry="7" fill="#6b4226"/>
    <!-- Upright stem -->
    <path d="M0 -25 C0 -50, 0 -75, 0 -105" stroke="#4a9a30" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0 -65 C-18 -75, -36 -72, -38 -56 C-26 -58, -12 -63, 0 -65 Z" fill="#5ab840"/>
    <!-- Right leaf -->
    <path d="M0 -80 C18 -90, 36 -87, 38 -71 C26 -73, 12 -78, 0 -80 Z" fill="#5ab840"/>
    <!-- Upright flower -->
    <g transform="translate(0,-108)">
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#f87171" opacity="0.9"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#f87171" opacity="0.9" transform="rotate(72)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#f87171" opacity="0.9" transform="rotate(144)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#f87171" opacity="0.9" transform="rotate(216)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#f87171" opacity="0.9" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="10" fill="#fbbf24"/>
    </g>
  </g>

</svg>
