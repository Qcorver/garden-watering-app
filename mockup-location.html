<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mockup – Locatie kaart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #e5e7e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 16px;
  }
  .phone {
    width: 375px;
    background: #f0f4ec;
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    border: 8px solid #1a1a1a;
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(160deg, #1a3d1a 0%, #2d5a2d 40%, #3d7a3d 100%);
    padding: 52px 28px 40px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(120,200,80,0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .lang-btn.active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  /* ── Content ── */
  .content {
    padding: 24px 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6b7c69;
    margin: 20px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(30,60,20,0.06);
  }

  /* ── Location picker ── */
  .loc-current {
    margin: 0 0 12px;
    font-size: 14px;
    color: #555;
  }
  .loc-current strong { color: #1a3d1a; }

  .gps-btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #3d7a3d, #5aaa3a);
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(61,122,61,0.35);
  }
  .loc-form {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .loc-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #d8e8d4;
    background: #fff;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: #1a3d1a;
    outline: none;
  }
  .loc-input::placeholder { color: #b0c4ac; }
  .loc-submit {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: #3d7a3d;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── Tab bar ── */
  .tabbar {
    background: rgba(240,244,236,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(120,160,100,0.15);
    display: flex;
    padding: 8px 0 20px;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 4px 0;
    font-size: 10px;
    color: #9aab94;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .tab.active { color: #3d7a3d; font-weight: 600; }
  .tab .icon { font-size: 22px; }
  .tab.active .tab-label-wrap {
    background: rgba(61,122,61,0.1);
    border-radius: 12px;
    padding: 2px 12px;
  }
</style>
</head>
<body>
<div class="phone">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-top-row">
      <div class="lang-toggle">
        <button class="lang-btn">EN</button>
        <button class="lang-btn active">NL</button>
      </div>
    </div>
    <h1>Instellingen</h1>
    <div class="hero-sub">Voorkeuren &amp; locatie</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Location -->
    <div class="section-label">Locatie</div>
    <div class="card">
      <!-- NEW: huidige locatie boven de knop -->
      <p class="loc-current">Huidige locatie: <strong>Amsterdam, NL</strong></p>

      <button class="gps-btn">📍 Gebruik mijn huidige locatie</button>

      <div class="loc-form">
        <input class="loc-input" type="text" placeholder="bijv. Amsterdam">
        <button class="loc-submit">Instellen</button>
      </div>
    </div>

    <!-- Soil type (preview only) -->
    <div class="section-label">Bodemtype</div>
    <div class="card" style="color:#6b7c69;font-size:13px;">Weet ik niet ▾</div>

  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab"><span class="icon">💧</span><span>Beste Dag</span></div>
    <div class="tab"><span class="icon">📅</span><span>Kalender</span></div>
    <div class="tab"><span class="icon">✂️</span><span>Snoeien</span></div>
    <div class="tab active">
      <div class="tab-label-wrap">
        <span class="icon">⚙️</span>
      </div>
      <span>Instellingen</span>
    </div>
  </div>

</div>
</body>
</html>
